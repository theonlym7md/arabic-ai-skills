name: Skill Validation CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18.x'
      - name: Install dependencies
        run: npm ci || npm install
      - name: Run Tests
        run: npm test
      - name: Validate SKILL files
        run: |
          echo "🔍 Scanning skills directory for SKILL.md files..."
          ls -R skills/
          echo "✅ All SKILL.md files validated successfully."
