routing_config:
  strategy: "semantic_similarity_and_intent_matching"
  threshold: 0.85

intent_rules:
  - intent_name: "govtech_and_hospitality"
    required_tags: 
      - "luxury"
      - "visionary"
      - "government"
    injected_skills:
      - "nodes/domain_rules/luxury_brand.md"
    banned_tags:
      - "casual"
      - "slang"
      
  - intent_name: "fintech_and_ecommerce"
    required_tags:
      - "conversion"
      - "trust"
      - "payment"
    injected_skills:
      - "nodes/domain_rules/fintech_trust.md"
      - "nodes/mental_models/pain_of_paying.md"
      
  - intent_name: "media_and_content"
    required_tags:
      - "youth"
      - "creative"
    injected_skills:
      - "nodes/domain_rules/youth_slang.md"

universal_injection:
  # These are always applied regardless of intent
  - "nodes/anti_patterns/slop_blacklist.md"
  - "pipelines/diagnosis_pipeline.json"
  - "pipelines/repair_pipeline.json"
