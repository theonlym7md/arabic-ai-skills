$schema: "https://json-schema.org/draft/2020-12/schema"
title: "OntologyEntity"
type: "object"
properties:
  entity:
    type: "string"
    description: "Unique identifier of the entity"
  confidence:
    type: "number"
    description: "Metadata confidence rating of the entity (0.0 to 1.0)"
  source:
    type: "string"
    description: "Authority source of the entity guidance (e.g. Sdaia / DGA Standard)"
  last_reviewed:
    type: "string"
    description: "ISO date string of last review"
  priority:
    type: "integer"
    description: "Base priority score (1-100)"
  inherits:
    type: "array"
    items:
      type: "string"
    description: "Parent entities inherited by this node"
  depends_on:
    type: "array"
    items:
      type: "string"
    description: "Prerequisite entities that must be loaded"
  conflicts_with:
    type: "array"
    items:
      type: "string"
    description: "Entities that cannot co-exist with this node"
  requires:
    type: "array"
    items:
      type: "string"
    description: "Mandatory companion entities"
  optional:
    type: "array"
    items:
      type: "string"
    description: "Optional helpful entities"
  fallback:
    type: "string"
    description: "Default fallback entity if this node fails"
  priority_override:
    type: "object"
    description: "Domain-specific priority adjustments"
  aliases:
    type: "array"
    items:
      type: "string"
    description: "Semantic search triggers"
  directives:
    type: "array"
    items:
      type: "string"
    description: "Actionable positive instructions enforced by this entity"
  examples:
    type: "array"
    items:
      type: "string"
    description: "Positive gold-standard phrasing examples for this entity"
  negative_examples:
    type: "array"
    items:
      type: "string"
    description: "Explicit negative patterns, AI clichés, and forbidden slop phrases for this entity"
