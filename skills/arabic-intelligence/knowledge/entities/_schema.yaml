$schema: "https://json-schema.org/draft/2020-12/schema"
title: "OntologyEntity"
type: "object"
properties:
  entity:
    type: "string"
    description: "Unique identifier of the entity"
  priority:
    type: "integer"
    description: "Base priority score (1-100)"
  inherits:
    type: "array"
    items:
      type: "string"
    description: "Parent entities inherited by this node"
  depends_on:
    type: "array"
    items:
      type: "string"
    description: "Prerequisite entities that must be loaded"
  conflicts_with:
    type: "array"
    items:
      type: "string"
    description: "Entities that cannot co-exist with this node"
  requires:
    type: "array"
    items:
      type: "string"
    description: "Mandatory companion entities"
  optional:
    type: "array"
    items:
      type: "string"
    description: "Optional helpful entities"
  fallback:
    type: "string"
    description: "Default fallback entity if this node fails"
  priority_override:
    type: "object"
    description: "Domain-specific priority adjustments"
  aliases:
    type: "array"
    items:
      type: "string"
    description: "Semantic search triggers"
  directives:
    type: "array"
    items:
      type: "string"
    description: "Actionable instructions enforced by this entity"
